services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.1.2.11
    container_name: slate-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-slate}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-slate}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-slate}
      # let the created user run DDL and manage the slate database
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      # 8123 = HTTP interface (the `clickhouse` Rust crate talks to this)
      # 9000 = native TCP (clickhouse-client uses this)
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_TCP_PORT:-9000}:9000"
    ulimits:
      # ClickHouse wants a high open-file limit or it warns/refuses on startup
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test:
        - CMD-SHELL
        - clickhouse-client --user "${CLICKHOUSE_USER:-slate}" --password "${CLICKHOUSE_PASSWORD:-slate}" --query "SELECT 1"
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 10s

volumes:
  clickhouse-data:
